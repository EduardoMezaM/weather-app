<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weathher App</title>
</head>
<body>
        
    <div id="search-div">
        <input id="cityInput" type="text" placeholder="Enter your city...">
        <button id="searchBtn">Search</button>
    </div>

    <div id="cityHeader">.............</div>

    <div id="container">
        <div id="weather">
            <div id="temp"></div>
            <div id="conditions"></div>
            <div id="description"></div>
        </div>
       
        <div id="imageDiv"><img id="image"></div>
       
        <div id="tomorrow">Tomorrow</div>
        <div id="tempMax"></div>
        <div id="tempMin"></div>
        <div id="tomorrowCond"></div>
        <div id="tomorrowDesc"></div>

    </div>
    
</body>
</html>
